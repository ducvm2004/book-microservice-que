{% extends "base.html" %}

{% block title %}Login - Bookstore Gateway{% endblock %}

{% block content %}

<div class="center-shell">

<section class="card" style="width: 440px;">

<h1>Login</h1>


{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post">
{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required
/>

<select name="role" required>
<option value="customer">Customer</option>
<option value="staff">Staff</option>
</select>

<button type="submit">
Login
</button>

</form>

</section>

</div>

{% endblock %}
